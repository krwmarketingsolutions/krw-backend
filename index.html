<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KRW Leads Portal</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand:      #1a3a5c;
    --brand-dark: #122840;
    --accent:     #2d6a4f;
    --accent-dk:  #1b4332;
    --red:        #dc2626;
    --red-bg:     #fef2f2;
    --green-bg:   #d1fae5;
    --green-text: #065f46;
    --green-bdr:  #6ee7b7;
    --err-bg:     #fee2e2;
    --err-text:   #991b1b;
    --err-bdr:    #fca5a5;
    --border:     #e2e8f0;
    --muted:      #64748b;
    --bg:         #f1f5f9;
    --surface:    #ffffff;
    --radius:     8px;
    --radius-sm:  5px;
  }

  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: #1e293b;
  }

  /* ── Header ── */
  .portal-header {
    background: var(--brand);
    color: white;
    padding: 1rem 1.75rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .portal-header h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -.01em;
  }
  .portal-header p {
    font-size: 11px;
    opacity: .65;
    margin-top: 2px;
  }
  .header-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  /* ── Filter bar ── */
  .filter-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: .85rem 1.75rem;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .filter-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
    white-space: nowrap;
  }
  .filter-select {
    font-family: inherit;
    font-size: 13px;
    padding: 7px 11px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: #f8fafc;
    color: #1e293b;
    outline: none;
    cursor: pointer;
    transition: border .15s, box-shadow .15s;
  }
  .filter-select:focus {
    border-color: var(--accent);
    background: white;
    box-shadow: 0 0 0 3px rgba(45,106,79,.09);
  }
  .refresh-btn {
    font-family: inherit;
    font-size: 12px;
    padding: 7px 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background .15s;
    white-space: nowrap;
  }
  .refresh-btn:hover { background: var(--accent-dk); }
  .refresh-btn:disabled { background: #94a3b8; cursor: not-allowed; }

  /* ── Summary KPIs ── */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    padding: 1.25rem 1.75rem;
  }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: .9rem 1rem;
  }
  .kpi-card.accent { border-left: 3px solid var(--accent); }
  .kpi-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .kpi-value {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -.02em;
    color: var(--accent);
  }
  .kpi-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  /* ── Leads table ── */
  .table-wrap {
    padding: 0 1.75rem 2rem;
    overflow-x: auto;
  }
  .leads-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .leads-table thead th {
    text-align: left;
    padding: 9px 12px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: #f8fafc;
    white-space: nowrap;
  }
  .leads-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .12s;
  }
  .leads-table tbody tr:last-child { border-bottom: none; }
  .leads-table tbody tr:hover { background: #f8fafc; }
  .leads-table td {
    padding: 9px 12px;
    vertical-align: middle;
    white-space: nowrap;
  }
  .leads-table td.wrap { white-space: normal; }

  /* ── Status pills ── */
  .status-pill {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
    white-space: nowrap;
  }
  .status-pill.received    { background: #dbeafe; color: #1e40af; }
  .status-pill.forwarded   { background: var(--green-bg); color: var(--green-text); }
  .status-pill.forwarding  { background: #fef9c3; color: #854d0e; }
  .status-pill.buyer_rejected { background: var(--err-bg); color: var(--err-text); }
  .status-pill.forward_failed { background: var(--err-bg); color: var(--err-text); }

  /* ── Spinner ── */
  .spinner-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1rem;
    gap: 14px;
    color: var(--muted);
    font-size: 13px;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--brand);
    border-radius: 50%;
    animation: spin .75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Empty / error states ── */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
    font-size: 13px;
  }
  .error-banner {
    margin: 1rem 1.75rem;
    padding: 12px 14px;
    background: var(--err-bg);
    color: var(--err-text);
    border: 1px solid var(--err-bdr);
    border-radius: var(--radius-sm);
    font-size: 13px;
    display: none;
  }
  .error-banner.show { display: block; }

  /* ── Muted text ── */
  .text-muted { color: var(--muted); }
  .text-mono  { font-family: 'Courier New', monospace; font-size: 11px; }
</style>
</head>
<body>

<div class="portal-header">
  <div>
    <h1>KRW Leads Portal</h1>
    <p>Live lead feed · Auto-refreshes on filter change</p>
  </div>
  <div class="header-controls">
    <span id="last-updated" style="font-size:11px;opacity:.6"></span>
  </div>
</div>

<div class="filter-bar">
  <span class="filter-label">Period:</span>
  <select id="filter-period" class="filter-select" onchange="loadCalls()">
    <option value="yesterday">Yesterday</option>
    <option value="week" selected>This Week</option>
    <option value="month">This Month</option>
  </select>

  <span class="filter-label" style="margin-left:8px">Campaign:</span>
  <select id="filter-campaign" class="filter-select" onchange="loadCalls()">
    <option value="">All Campaigns</option>
  </select>

  <span class="filter-label" style="margin-left:8px">Status:</span>
  <select id="filter-status" class="filter-select" onchange="loadCalls()">
    <option value="">All Statuses</option>
    <option value="received">Received</option>
    <option value="forwarded">Forwarded</option>
    <option value="buyer_rejected">Buyer Rejected</option>
    <option value="forward_failed">Forward Failed</option>
  </select>

  <button class="refresh-btn" id="refresh-btn" onclick="loadCalls()">↻ Refresh</button>
</div>

<div id="error-banner" class="error-banner"></div>

<div class="kpi-row">
  <div class="kpi-card accent">
    <div class="kpi-label">Total Leads</div>
    <div class="kpi-value" id="kpi-total">—</div>
    <div class="kpi-sub" id="kpi-period-label">This Week</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">Forwarded</div>
    <div class="kpi-value" id="kpi-forwarded" style="color:#065f46">—</div>
    <div class="kpi-sub">Accepted by buyer</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">Pending</div>
    <div class="kpi-value" id="kpi-pending" style="color:#854d0e">—</div>
    <div class="kpi-sub">Awaiting forward</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">Rejected</div>
    <div class="kpi-value" id="kpi-rejected" style="color:var(--red)">—</div>
    <div class="kpi-sub">Buyer / forward error</div>
  </div>
</div>

<div class="table-wrap">
  <table class="leads-table" id="leads-table">
    <thead>
      <tr>
        <th>Ref ID</th>
        <th>Received</th>
        <th>Campaign</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>State</th>
        <th>Publisher</th>
        <th>Status</th>
        <th>Buyer ID</th>
      </tr>
    </thead>
    <tbody id="leads-body">
      <tr><td colspan="10"><div class="spinner-wrap"><div class="spinner"></div><span>Loading leads…</span></div></td></tr>
    </tbody>
  </table>
</div>

<script>
(function () {
  'use strict';

  var API_BASE = 'https://krw-backend-production.up.railway.app';
  var API_KEY  = 'krwleads2026secure';

  /* ── Period → days mapping ─────────────────────── */
  var PERIOD_DAYS = {
    yesterday: 1,
    week:      7,
    month:     30
  };

  var PERIOD_LABELS = {
    yesterday: 'Yesterday',
    week:      'This Week',
    month:     'This Month'
  };

  /* ── Helpers ────────────────────────────────────── */
  function escHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    var d = new Date(iso);
    return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' }) +
           ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function fmtPhone(p) {
    if (!p) return '—';
    var s = String(p).replace(/\D/g, '');
    if (s.length === 10) return '(' + s.slice(0,3) + ') ' + s.slice(3,6) + '-' + s.slice(6);
    return p;
  }

  function statusPill(status) {
    var label = (status || 'received').replace(/_/g, ' ');
    return '<span class="status-pill ' + escHtml(status || 'received') + '">' + escHtml(label) + '</span>';
  }

  function showError(msg) {
    var el = document.getElementById('error-banner');
    el.textContent = '⚠ ' + msg;
    el.classList.add('show');
  }

  function hideError() {
    document.getElementById('error-banner').classList.remove('show');
  }

  /* ── Load campaigns for filter dropdown ─────────── */
  function loadCampaigns() {
    fetch(API_BASE + '/campaigns', {
      headers: { 'x-api-key': API_KEY }
    })
    .then(function (res) { return res.json(); })
    .then(function (data) {
      if (!data.ok || !data.campaigns) return;
      var sel = document.getElementById('filter-campaign');
      data.campaigns.forEach(function (c) {
        var opt = document.createElement('option');
        opt.value = c.slug;
        opt.textContent = c.name || c.slug;
        sel.appendChild(opt);
      });
    })
    .catch(function () { /* silently ignore — campaign filter still works with "All" */ });
  }

  /* ── Main: load leads ───────────────────────────── */
  function loadCalls() {
    var period   = document.getElementById('filter-period').value;
    var campaign = document.getElementById('filter-campaign').value;
    var status   = document.getElementById('filter-status').value;

    /* Map period label to day count */
    var days = PERIOD_DAYS[period] || 7;

    /* Update KPI period label */
    var periodLabel = PERIOD_LABELS[period] || 'This Week';
    document.getElementById('kpi-period-label').textContent = periodLabel;

    /* Disable refresh button while loading */
    var btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    btn.textContent = 'Loading…';

    /* Show loading state in table */
    document.getElementById('leads-body').innerHTML =
      '<tr><td colspan="10"><div class="spinner-wrap"><div class="spinner"></div><span>Loading leads…</span></div></td></tr>';

    hideError();

    /* Build query string */
    var qs = '?days=' + days + '&limit=500';
    if (campaign) qs += '&campaign=' + encodeURIComponent(campaign);
    if (status)   qs += '&status='   + encodeURIComponent(status);

    fetch(API_BASE + '/leads/feed' + qs, {
      headers: { 'x-api-key': API_KEY }
    })
    .then(function (res) {
      if (!res.ok) throw new Error('Server error (' + res.status + ')');
      return res.json();
    })
    .then(function (data) {
      if (!data.ok) throw new Error(data.error || 'Unknown error');
      renderLeads(data.leads || []);
      updateKPIs(data.leads || []);
      document.getElementById('last-updated').textContent =
        'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    })
    .catch(function (err) {
      showError('Could not load leads: ' + err.message);
      document.getElementById('leads-body').innerHTML =
        '<tr><td colspan="10"><div class="empty-state">Failed to load leads. Check your connection and try again.</div></td></tr>';
    })
    .finally(function () {
      btn.disabled = false;
      btn.textContent = '↻ Refresh';
    });
  }

  /* ── Render leads table ─────────────────────────── */
  function renderLeads(leads) {
    var tbody = document.getElementById('leads-body');
    if (!leads.length) {
      tbody.innerHTML = '<tr><td colspan="10"><div class="empty-state">No leads found for this period.</div></td></tr>';
      return;
    }
    tbody.innerHTML = leads.map(function (lead) {
      var ref = 'KRW-' + (lead.campaign || '').toUpperCase() + '-' + lead.id;
      return '<tr>' +
        '<td class="text-mono">' + escHtml(ref) + '</td>' +
        '<td class="text-muted">' + escHtml(fmtDate(lead.received_at)) + '</td>' +
        '<td>' + escHtml(lead.campaign || '—') + '</td>' +
        '<td>' + escHtml((lead.first_name || '') + ' ' + (lead.last_name || '')) + '</td>' +
        '<td class="text-muted">' + escHtml(lead.email || '—') + '</td>' +
        '<td class="text-mono">' + escHtml(fmtPhone(lead.phone)) + '</td>' +
        '<td>' + escHtml(lead.state || '—') + '</td>' +
        '<td class="text-muted">' + escHtml(lead.publisher_sub || '—') + '</td>' +
        '<td>' + statusPill(lead.status) + '</td>' +
        '<td class="text-mono text-muted">' + escHtml(lead.buyer_intake_id || '—') + '</td>' +
        '</tr>';
    }).join('');
  }

  /* ── Update KPI cards ───────────────────────────── */
  function updateKPIs(leads) {
    var forwarded = leads.filter(function (l) { return l.status === 'forwarded'; }).length;
    var pending   = leads.filter(function (l) { return l.status === 'received' || l.status === 'forwarding'; }).length;
    var rejected  = leads.filter(function (l) { return l.status === 'buyer_rejected' || l.status === 'forward_failed'; }).length;

    document.getElementById('kpi-total').textContent     = leads.length;
    document.getElementById('kpi-forwarded').textContent = forwarded;
    document.getElementById('kpi-pending').textContent   = pending;
    document.getElementById('kpi-rejected').textContent  = rejected;
  }

  /* ── Boot ───────────────────────────────────────── */
  loadCampaigns();
  loadCalls();

}());
</script>
</body>
</html>
